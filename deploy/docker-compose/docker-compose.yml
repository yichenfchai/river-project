version: "3.8"

# Grand Canal Guardian — 模块化单体部署
# 本地开发：docker compose up -d (只需 3 个基础设施容器 + 1 个应用容器)

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: gcg-postgres
    environment:
      POSTGRES_USER: canal
      POSTGRES_PASSWORD: canal_secret_2026
      POSTGRES_DB: grand_canal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canal -d grand_canal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gcg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gcg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  app:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    container_name: gcg-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: canal
      DB_PASSWORD: canal_secret_2026
      DB_NAME: grand_canal
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
