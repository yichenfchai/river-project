version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gcg-postgres
    environment:
      POSTGRES_USER: canal
      POSTGRES_PASSWORD: canal_secret_2026
      POSTGRES_DB: grand_canal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canal -d grand_canal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gcg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Phase 2 (未启用) ----
  # rabbitmq:
  #   image: rabbitmq:3.12-management-alpine
  #   profiles: [full]

volumes:
  postgres_data:
  redis_data:
