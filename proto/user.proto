syntax = "proto3";

package user;
option go_package = "github.com/grand-canal-guardian/proto/gen/go/user";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserByUsername(GetUserByUsernameRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserByUsernameRequest {
  string username = 1;
}

message CreateUserRequest {
  string username = 1;
  string password_hash = 2;
  string email = 3;
  string nickname = 4;
  string role = 5;
}

message CreateUserResponse {
  string user_id = 1;
}

message UpdateUserRequest {
  string user_id = 1;
  string nickname = 2;
  string avatar_url = 3;
  string bio = 4;
}

message UpdateUserResponse {
  bool success = 1;
}

message GetUserResponse {
  string user_id = 1;
  string username = 2;
  string nickname = 3;
  string email = 4;
  string avatar_url = 5;
  string role = 6;
  string bio = 7;
  int32 points = 8;
  string rank_title = 9;
  int64 created_at = 10;
}
