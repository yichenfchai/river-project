syntax = "proto3";

package quiz;
option go_package = "github.com/grand-canal-guardian/proto/gen/go/quiz";

service QuizService {
  rpc GetQuestions(GetQuestionsRequest) returns (GetQuestionsResponse);
  rpc SubmitAnswer(SubmitAnswerRequest) returns (SubmitAnswerResponse);
  rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse);
  rpc GetUserStats(GetUserStatsRequest) returns (GetUserStatsResponse);
}

message GetQuestionsRequest {
  string difficulty = 1;  // easy | medium | hard | all
  int32 count = 2;
}

message Question {
  string question_id = 1;
  string content = 2;
  repeated string options = 3;
  string difficulty = 4;
  string category = 5;
}

message GetQuestionsResponse {
  repeated Question questions = 1;
  string session_id = 2;
}

message SubmitAnswerRequest {
  string user_id = 1;
  string session_id = 2;
  string question_id = 3;
  int32 selected_option = 4;  // 0-indexed
}

message SubmitAnswerResponse {
  bool correct = 1;
  int32 score = 2;
  int32 total_score = 3;
  int32 streak = 4;
}

message GetLeaderboardRequest {
  string period = 1;  // daily | weekly | total
  int32 limit = 2;
}

message LeaderboardEntry {
  string user_id = 1;
  string nickname = 2;
  string avatar_url = 3;
  int32 score = 4;
  int32 rank = 5;
}

message GetLeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
  string period = 2;
}

message GetUserStatsRequest {
  string user_id = 1;
}

message GetUserStatsResponse {
  string user_id = 1;
  int32 total_score = 2;
  int32 total_questions = 3;
  int32 correct_count = 4;
  double accuracy = 5;
  int32 streak = 6;
  int32 max_streak = 7;
  string rank_title = 8;
}
