openapi: "3.0.3"
info:
  title: 大运河生态与文化保护平台 API
  description: |
    Grand Canal Guardian — 模块化单体架构 REST API 规范。
    
    **模块** (同一进程, /api/v1 前缀):
    - Auth: 用户认证 & RBAC
    - Users: 用户管理
    - Posts: 分享广场帖子/评论
    - Map: 大运河时空 GIS 地图
    - Quiz: 趣味问答 & 积分排名
    - LLM: AI 对话 & 科普故事 (Go 内调用外部 API)
    - Vision: 垃圾分类识别 (Go 内调用)
    - Admin: 管理后台
    
    **认证**: JWT Bearer Token
  version: 2.0.0
  contact:
    name: Grand Canal Guardian Team

servers:
  - url: http://localhost:8080/api/v1
    description: 开发环境
  - url: https://api.grandcanal.dev/api/v1
    description: 测试环境
  - url: https://api.grandcanal.com/api/v1
    description: 生产环境

tags:
  - name: Auth
    description: 认证与授权
  - name: Users
    description: 用户管理
  - name: Posts
    description: 分享广场帖子
  - name: Comments
    description: 评论
  - name: Map
    description: 大运河时空地图
  - name: Quiz
    description: 趣味问答
  - name: Leaderboard
    description: 积分排行榜
  - name: LLM
    description: AI 对话 & 科普故事
  - name: Vision
    description: YOLO 垃圾分类识别
  - name: Admin
    description: 管理后台

# ============================================================
# Security
# ============================================================
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ---- 通用响应 ----
  schemas:
    # ---- 基础类型 ----
    Error:
      type: object
      properties:
        code: { type: integer, example: 40001 }
        message: { type: string, example: "参数校验失败" }
        detail: { type: string }

    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        page_size: { type: integer, example: 20 }
        total: { type: integer, example: 156 }
        total_pages: { type: integer, example: 8 }

    Timestamp:
      type: string
      format: date-time
      example: "2026-06-16T10:30:00Z"

    # ---- User ----
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string, example: "canal_fan" }
        nickname: { type: string, example: "运河小舟" }
        email: { type: string, format: email }
        avatar_url: { type: string, format: uri }
        role: { type: string, enum: [user, monitor, admin] }
        created_at: { $ref: "#/components/schemas/Timestamp" }

    UserProfile:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            bio: { type: string, example: "爱运河，爱自然" }
            points: { type: integer, example: 1280 }
            rank_title: { type: string, example: "白银守护者" }

    RegisterRequest:
      type: object
      required: [username, password, email]
      properties:
        username: { type: string, minLength: 3, maxLength: 32 }
        password: { type: string, minLength: 8, maxLength: 128 }
        email: { type: string, format: email }
        nickname: { type: string, maxLength: 64 }
        role: { type: string, enum: [user, monitor], default: user }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: "Bearer" }
        expires_in: { type: integer, example: 900 }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    # ---- Post ----
    Post:
      type: object
      properties:
        id: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/User" }
        title: { type: string, example: "今天在运河边拍到了白鹭！" }
        content: { type: string }
        images: { type: array, items: { type: string, format: uri } }
        tags: { type: array, items: { type: string } }
        topic: { type: string, enum: [share, ecology, culture, question, other] }
        like_count: { type: integer, example: 42 }
        comment_count: { type: integer, example: 7 }
        is_liked: { type: boolean }
        status: { type: string, enum: [pending, approved, rejected] }
        created_at: { $ref: "#/components/schemas/Timestamp" }
        updated_at: { $ref: "#/components/schemas/Timestamp" }

    CreatePostRequest:
      type: object
      required: [title, content]
      properties:
        title: { type: string, maxLength: 128 }
        content: { type: string, maxLength: 10000 }
        images: { type: array, items: { type: string, format: binary }, maxItems: 9 }
        tags: { type: array, items: { type: string }, maxItems: 5 }
        topic: { type: string, enum: [share, ecology, culture, question, other], default: share }

    # ---- Comment ----
    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        post_id: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/User" }
        content: { type: string }
        parent_id: { type: string, format: uuid, nullable: true }
        reply_to: { $ref: "#/components/schemas/User" }
        created_at: { $ref: "#/components/schemas/Timestamp" }

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, maxLength: 2000 }
        parent_id: { type: string, format: uuid }

    # ---- Map ----
    LayerInfo:
      type: object
      properties:
        id: { type: string, example: "sui_tang_canal" }
        name: { type: string, example: "隋唐大运河" }
        era: { type: string, example: "581-907" }
        description: { type: string }
        min_zoom: { type: integer, example: 3 }
        max_zoom: { type: integer, example: 14 }

    POI:
      type: object
      properties:
        id: { type: string }
        name: { type: string, example: "扬州古运河码头" }
        type: { type: string, enum: [heritage, ecology, lock, bridge, port, museum] }
        lat: { type: number, format: double, example: 32.39 }
        lng: { type: number, format: double, example: 119.42 }
        era: { type: string }
        description: { type: string }
        image_url: { type: string, format: uri }

    TimelineEvent:
      type: object
      properties:
        year: { type: integer, example: 605 }
        title: { type: string, example: "隋炀帝开凿通济渠" }
        description: { type: string }
        route_id: { type: string }

    # ---- Quiz ----
    Question:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [choice, true_false] }
        difficulty: { type: string, enum: [easy, medium, hard] }
        category: { type: string, enum: [history, ecology, culture, geography, water_conservancy] }
        question: { type: string, example: "京杭大运河全长约多少公里？" }
        options: { type: array, items: { type: string } }
        # options example: ["A. 1200", "B. 1794", "C. 2500", "D. 3200"]

    SubmitAnswerRequest:
      type: object
      required: [question_id, answer]
      properties:
        question_id: { type: string }
        answer: { type: string, example: "B" }
        answer_time_ms: { type: integer, example: 3500 }

    SubmitAnswerResponse:
      type: object
      properties:
        is_correct: { type: boolean }
        correct_answer: { type: string }
        explanation: { type: string }
        points_earned: { type: integer, example: 15 }
        streak_bonus: { type: integer, example: 5 }
        total_points: { type: integer, example: 1330 }

    LeaderboardEntry:
      type: object
      properties:
        rank: { type: integer, example: 1 }
        user: { $ref: "#/components/schemas/User" }
        total_points: { type: integer, example: 8750 }
        rank_title: { type: string, example: "钻石守护者" }
        answer_count: { type: integer, example: 320 }
        accuracy: { type: number, format: float, example: 0.87 }

    # ---- LLM ----
    ChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string, maxLength: 2000, example: "小精灵，运河里有哪些鱼类？" }
        session_id: { type: string }
        context:
          type: object
          properties:
            current_page: { type: string, example: "map" }
            location_poi: { type: string }

    ChatStreamEvent:
      type: object
      properties:
        token: { type: string }
        index: { type: integer }

    StoryGenerateRequest:
      type: object
      required: [topic, target_age]
      properties:
        topic: { type: string, enum: [history, ecology, legend, engineering, folk_custom] }
        target_age: { type: string, enum: [child, teen, adult] }
        poi_id: { type: string }
        style: { type: string, enum: [storytelling, dialogue, adventure], default: storytelling }

    Story:
      type: object
      properties:
        id: { type: string }
        title: { type: string, example: "白鹭与运河少年" }
        content: { type: string }
        cover_image_prompt: { type: string }
        poi_related: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        created_at: { $ref: "#/components/schemas/Timestamp" }

    # ---- Vision ----
    GarbageDetection:
      type: object
      properties:
        class_name: { type: string, example: "塑料瓶" }
        category: { type: string, enum: [可回收物, 有害垃圾, 厨余垃圾, 其他垃圾] }
        confidence: { type: number, format: float, example: 0.96 }
        bbox:
          type: object
          properties:
            x: { type: integer }
            y: { type: integer }
            w: { type: integer }
            h: { type: integer }

    VisionClassifyResponse:
      type: object
      properties:
        image_id: { type: string, format: uuid }
        detections: { type: array, items: { $ref: "#/components/schemas/GarbageDetection" } }
        processing_time_ms: { type: integer, example: 120 }
        advice: { type: string, example: "塑料瓶属于可回收物，请清洗后投入蓝色垃圾桶" }

    # ---- Admin ----
    AdminDashboard:
      type: object
      properties:
        total_users: { type: integer, example: 12580 }
        active_today: { type: integer, example: 3420 }
        total_posts: { type: integer, example: 8900 }
        pending_reviews: { type: integer, example: 23 }
        quiz_players: { type: integer, example: 4500 }
        garbage_reports: { type: integer, example: 1280 }

  # ---- 通用参数 ----
  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSizeParam:
      name: page_size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    SortParam:
      name: sort
      in: query
      schema: { type: string, enum: [newest, popular, trending], default: newest }

  # ---- 通用响应 ----
  responses:
    400:
      description: 参数校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { code: 40001, message: "参数校验失败", detail: "title 字段为必填" }
    401:
      description: 未认证
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { code: 40100, message: "请先登录" }
    403:
      description: 无权限
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { code: 40300, message: "无权执行此操作" }
    404:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    429:
      description: 请求过于频繁
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { code: 42900, message: "请稍后再试", detail: "retry_after: 30s" }
    500:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

# ============================================================
# PATHS
# ============================================================
paths:

  # ========== Auth ==========
  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        201:
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
                  - type: object
                    properties:
                      user: { $ref: "#/components/schemas/User" }
        409:
          description: 用户名或邮箱已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example: { code: 40901, message: "用户名已被注册" }

  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        200:
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
                  - type: object
                    properties:
                      user: { $ref: "#/components/schemas/User" }
        401:
          description: 用户名或密码错误

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新 Access Token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        200:
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"

  /auth/logout:
    post:
      tags: [Auth]
      summary: 登出（Token 加入黑名单）
      responses:
        204:
          description: 登出成功

  # ========== Users ==========
  /users/me:
    get:
      tags: [Users]
      summary: 获取当前用户信息
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      tags: [Users]
      summary: 更新个人资料
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname: { type: string }
                bio: { type: string, maxLength: 200 }
                avatar_url: { type: string, format: uri }
      responses:
        200:
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{user_id}:
    get:
      tags: [Users]
      summary: 查看用户公开信息
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ========== Posts ==========
  /posts:
    get:
      tags: [Posts]
      summary: 帖子列表（支持搜索、筛选、分页）
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SortParam"
        - name: topic
          in: query
          schema: { type: string, enum: [share, ecology, culture, question, other] }
        - name: tag
          in: query
          schema: { type: string }
        - name: keyword
          in: query
          description: 全文搜索（走 Elasticsearch）
          schema: { type: string }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts: { type: array, items: { $ref: "#/components/schemas/Post" } }
                  pagination: { $ref: "#/components/schemas/Pagination" }
    post:
      tags: [Posts]
      summary: 发帖
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        201:
          description: 发帖成功（进入审核）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
              example: { id: "uuid", status: "pending" }

  /posts/{post_id}:
    get:
      tags: [Posts]
      summary: 帖子详情
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    put:
      tags: [Posts]
      summary: 编辑帖子
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, maxLength: 128 }
                content: { type: string, maxLength: 10000 }
                tags: { type: array, items: { type: string } }
      responses:
        200:
          description: 编辑成功
    delete:
      tags: [Posts]
      summary: 删除帖子
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        204:
          description: 删除成功

  /posts/{post_id}/like:
    post:
      tags: [Posts]
      summary: 点赞 / 取消点赞（toggle）
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: 操作成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_liked: { type: boolean }
                  like_count: { type: integer }

  # ========== Comments ==========
  /posts/{post_id}/comments:
    get:
      tags: [Comments]
      summary: 评论列表
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments: { type: array, items: { $ref: "#/components/schemas/Comment" } }
                  pagination: { $ref: "#/components/schemas/Pagination" }
    post:
      tags: [Comments]
      summary: 发表评论
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        201:
          description: 评论成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{comment_id}:
    delete:
      tags: [Comments]
      summary: 删除评论
      parameters:
        - name: comment_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        204:
          description: 删除成功

  # ========== Map ==========
  /map/layers:
    get:
      tags: [Map]
      summary: 获取可用地图图层列表
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  layers: { type: array, items: { $ref: "#/components/schemas/LayerInfo" } }

  /map/pois:
    get:
      tags: [Map]
      summary: 查询周边 POI
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, format: double }
        - name: lng
          in: query
          required: true
          schema: { type: number, format: double }
        - name: radius
          in: query
          description: 搜索半径 (米)
          schema: { type: integer, default: 5000, minimum: 100, maximum: 50000 }
        - name: type
          in: query
          schema: { type: string, enum: [heritage, ecology, lock, bridge, port, museum] }
        - name: era
          in: query
          schema: { type: string }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  pois: { type: array, items: { $ref: "#/components/schemas/POI" } }

  /map/pois/{poi_id}:
    get:
      tags: [Map]
      summary: POI 详情
      parameters:
        - name: poi_id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/POI"

  /map/timeline:
    get:
      tags: [Map]
      summary: 获取大运河历史时间线
      parameters:
        - name: year_from
          in: query
          schema: { type: integer, example: 581 }
        - name: year_to
          in: query
          schema: { type: integer, example: 1911 }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  events: { type: array, items: { $ref: "#/components/schemas/TimelineEvent" } }

  /map/routes/{route_id}:
    get:
      tags: [Map]
      summary: 运河路线详情（含 GeoJSON）
      parameters:
        - name: route_id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  era: { type: string }
                  length_km: { type: number }
                  geojson:
                    type: object
                    description: GeoJSON LineString
                  description: { type: string }

  /map/search:
    get:
      tags: [Map]
      summary: 搜索地点/POI
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  results: { type: array, items: { $ref: "#/components/schemas/POI" } }

  # ========== Quiz ==========
  /quiz/questions:
    get:
      tags: [Quiz]
      summary: 获取题目（随机抽取）
      parameters:
        - name: count
          in: query
          schema: { type: integer, default: 10, minimum: 1, maximum: 50 }
        - name: difficulty
          in: query
          schema: { type: string, enum: [easy, medium, hard, mixed], default: mixed }
        - name: category
          in: query
          schema: { type: string, enum: [history, ecology, culture, geography, water_conservancy] }
      responses:
        200:
          description: 成功（不返回答案）
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string }
                  questions: { type: array, items: { $ref: "#/components/schemas/Question" } }

  /quiz/submit:
    post:
      tags: [Quiz]
      summary: 提交答案
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, question_id, answer]
              properties:
                session_id: { type: string }
                question_id: { type: string }
                answer: { type: string }
                answer_time_ms: { type: integer }
      responses:
        200:
          description: 提交结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnswerResponse"

  /quiz/submit-batch:
    post:
      tags: [Quiz]
      summary: 批量提交答案（一轮答题结束）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, answers]
              properties:
                session_id: { type: string }
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      question_id: { type: string }
                      answer: { type: string }
                      answer_time_ms: { type: integer }
      responses:
        200:
          description: 批量结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  correct_count: { type: integer }
                  total_count: { type: integer }
                  total_points_earned: { type: integer }
                  new_total_points: { type: integer }
                  rank_title: { type: string }
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SubmitAnswerResponse"

  /quiz/users/{user_id}/stats:
    get:
      tags: [Quiz]
      summary: 用户答题统计
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_points: { type: integer }
                  rank_title: { type: string }
                  total_answers: { type: integer }
                  correct_answers: { type: integer }
                  accuracy: { type: number, format: float }
                  current_streak: { type: integer }
                  max_streak: { type: integer }
                  category_breakdown:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        total: { type: integer }
                        correct: { type: integer }

  # ========== Leaderboard ==========
  /leaderboard:
    get:
      tags: [Leaderboard]
      summary: 积分排行榜
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [daily, weekly, monthly, total], default: total }
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  period: { type: string }
                  leaderboard: { type: array, items: { $ref: "#/components/schemas/LeaderboardEntry" } }
                  my_rank:
                    type: object
                    nullable: true
                    properties:
                      rank: { type: integer }
                      total_points: { type: integer }

  # ========== LLM ==========
  /llm/chat:
    post:
      tags: [LLM]
      summary: 运河小精灵对话（SSE 流式响应）
      description: |
        返回 Server-Sent Events 流:
        - event: `token` → data: `{"token": "...", "index": N}`
        - event: `done` → data: `{"total_tokens": N, "session_id": "..."}`
        - event: `error` → data: `{"message": "..."}`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        200:
          description: SSE 流
          content:
            text/event-stream:
              schema:
                type: string

  /llm/chat/sessions:
    get:
      tags: [LLM]
      summary: 获取历史对话会话列表
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      properties:
                        session_id: { type: string }
                        title: { type: string }
                        last_message: { type: string }
                        updated_at: { $ref: "#/components/schemas/Timestamp" }

  /llm/chat/sessions/{session_id}:
    get:
      tags: [LLM]
      summary: 获取历史对话消息
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        role: { type: string, enum: [user, assistant] }
                        content: { type: string }
                        created_at: { $ref: "#/components/schemas/Timestamp" }
    delete:
      tags: [LLM]
      summary: 删除对话会话
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        204:
          description: 删除成功

  /llm/story/generate:
    post:
      tags: [LLM]
      summary: 生成科普故事
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryGenerateRequest"
      responses:
        201:
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /llm/story/{story_id}:
    get:
      tags: [LLM]
      summary: 获取已生成的科普故事
      parameters:
        - name: story_id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /llm/stories:
    get:
      tags: [LLM]
      summary: 科普故事列表
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: topic
          in: query
          schema: { type: string, enum: [history, ecology, legend, engineering, folk_custom] }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  stories: { type: array, items: { $ref: "#/components/schemas/Story" } }
                  pagination: { $ref: "#/components/schemas/Pagination" }

  # ========== Vision ==========
  /vision/classify:
    post:
      tags: [Vision]
      summary: 垃圾分类识别
      description: |
        上传垃圾图片进行 YOLO 分类识别。
        **需要 monitor 或 admin 角色**。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: 图片文件 (jpg/png/webp, < 10MB)
                lat:
                  type: number
                  format: double
                  description: 拍摄纬度（可选）
                lng:
                  type: number
                  format: double
                  description: 拍摄经度（可选）
      responses:
        200:
          description: 识别成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionClassifyResponse"
        413:
          description: 图片过大

  /vision/reports:
    get:
      tags: [Vision]
      summary: 垃圾分类上报记录
      description: |
        监测员查看自己的上报历史。
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: category
          in: query
          schema: { type: string, enum: [可回收物, 有害垃圾, 厨余垃圾, 其他垃圾] }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        image_url: { type: string }
                        detections: { type: array, items: { $ref: "#/components/schemas/GarbageDetection" } }
                        lat: { type: number, nullable: true }
                        lng: { type: number, nullable: true }
                        status: { type: string, enum: [pending, verified, dismissed] }
                        reported_at: { $ref: "#/components/schemas/Timestamp" }
                  pagination: { $ref: "#/components/schemas/Pagination" }

  /vision/health:
    get:
      tags: [Vision]
      summary: Vision 服务健康检查
      security: []
      responses:
        200:
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "healthy" }
                  model_loaded: { type: boolean, example: true }
                  gpu_available: { type: boolean }

  # ========== Admin ==========
  /admin/dashboard:
    get:
      tags: [Admin]
      summary: 管理后台数据看板
      description: 需要 admin 角色
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/users:
    get:
      tags: [Admin]
      summary: 用户列表（管理员）
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: role
          in: query
          schema: { type: string, enum: [user, monitor, admin] }
        - name: keyword
          in: query
          schema: { type: string }
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  users: { type: array, items: { $ref: "#/components/schemas/User" } }
                  pagination: { $ref: "#/components/schemas/Pagination" }

  /admin/users/{user_id}/role:
    put:
      tags: [Admin]
      summary: 修改用户角色
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [user, monitor, admin] }
      responses:
        200:
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{user_id}/ban:
    post:
      tags: [Admin]
      summary: 封禁/解封用户
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                banned: { type: boolean }
                reason: { type: string }
      responses:
        200:
          description: 操作成功

  /admin/posts/pending:
    get:
      tags: [Admin]
      summary: 待审核帖子列表
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        200:
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts: { type: array, items: { $ref: "#/components/schemas/Post" } }
                  pagination: { $ref: "#/components/schemas/Pagination" }

  /admin/posts/{post_id}/review:
    post:
      tags: [Admin]
      summary: 审核帖子（通过/驳回）
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [approve, reject] }
                reason: { type: string }
      responses:
        200:
          description: 审核完成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /admin/garbage/reports:
    get:
      tags: [Admin]
      summary: 垃圾分类上报汇总（管理员）
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: status
          in: query
          schema: { type: string, enum: [pending, verified, dismissed] }
      responses:
        200:
          description: 成功

  /admin/questions:
    post:
      tags: [Admin]
      summary: 添加问答题目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, options, answer, difficulty, category]
              properties:
                question: { type: string }
                options: { type: array, items: { type: string }, minItems: 2, maxItems: 6 }
                answer: { type: string }
                explanation: { type: string }
                difficulty: { type: string, enum: [easy, medium, hard] }
                category: { type: string, enum: [history, ecology, culture, geography, water_conservancy] }
      responses:
        201:
          description: 添加成功

  # ========== File Upload ==========
  /upload/image:
    post:
      tags: [Posts]
      summary: 上传图片（返回 URL）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 图片 (jpg/png/gif/webp, < 10MB)
      responses:
        200:
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
                  width: { type: integer }
                  height: { type: integer }

# ============================================================
# WebSocket (通知服务)
# ============================================================
  /ws:
    get:
      tags: [Map]
      summary: WebSocket 连接（实时通知 + 桌宠流式对话）
      description: |
        建立 WebSocket 连接，接收:
        - 审核结果通知
        - 点赞/评论通知
        - 桌宠对话 SSE 转发
        - 排行榜实时更新
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: JWT Access Token
      responses:
        101:
          description: WebSocket 协议升级
